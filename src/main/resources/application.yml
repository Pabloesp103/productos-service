server:
  port: 8081

spring:
  application:
    name: productservice
  data:
    mongodb:
      uri: mongodb://localhost:27017/productos
  cloud:
    aws:
      region:
        static: us-east-1
      credentials:
        access-key: test
        secret-key: test
      cloudwatch:
        endpoint: http://localhost:4566
      logging:
        log-group: practica-microservicios
        log-stream: productos-service

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
